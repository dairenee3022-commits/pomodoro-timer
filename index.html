<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 - Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<!-- 使用自建 WebSocket 信令，无需 PeerJS CDN -->
<style>
/* ========== CSS 变量：风格定义 ========== */
:root {
  --bg: #fafaf9;
  --bg2: #f0efed;
  --text: #1a1a1a;
  --text2: #666;
  --accent: #e07a5f;
  --accent2: #f2cc8f;
  --card-bg: #fff;
  --ring-bg: #e8e6e3;
  --border: #e2e0dd;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --radius: 16px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-weight: 400;
  --timer-size: 260px;
  --ring-width: 10;
  --glow: none;
  --btn-style: 'solid';
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 极简主义 */
body.theme-minimalist {
  --bg: #fafaf9; --bg2: #f0efed; --text: #1a1a1a; --text2: #888;
  --accent: #333; --accent2: #e0e0e0; --card-bg: #fff; --ring-bg: #e8e6e3;
  --border: #e8e6e3; --font: system-ui, sans-serif; --radius: 4px;
}
/* 赛博朋克 */
body.theme-cyberpunk {
  --bg: #0a0a0a; --bg2: #111; --text: #00ff41; --text2: #0a0;
  --accent: #ff00ff; --accent2: #00ffff; --card-bg: #0d0d0d; --ring-bg: #1a1a1a;
  --border: #333; --font: 'Share Tech Mono', monospace; --radius: 2px;
  --glow: 0 0 20px var(--accent); --shadow: 0 0 30px rgba(255,0,255,0.15);
}
/* 电子风格 */
body.theme-electronic {
  --bg: #0f0e17; --bg2: #1a1930; --text: #fffffe; --text2: #a7a9be;
  --accent: #ff8906; --accent2: #e53170; --card-bg: #1a1930; --ring-bg: #2a2940;
  --border: #2a2940; --font: system-ui, sans-serif; --radius: 8px;
  --glow: 0 0 15px rgba(255,137,6,0.4);
}
/* 液晶风格 */
body.theme-lcd {
  --bg: #9ea88b; --bg2: #8a9478; --text: #1a1a0a; --text2: #3a3a2a;
  --accent: #1a1a0a; --accent2: #5a6a3a; --card-bg: #aeb89b; --ring-bg: #8e9878;
  --border: #7e8868; --font: 'Orbitron', monospace; --radius: 2px;
}
/* 自然有机 */
body.theme-natural {
  --bg: #f5f0e8; --bg2: #e8e0d0; --text: #3d3226; --text2: #8b7355;
  --accent: #5b8c5a; --accent2: #c9a96e; --card-bg: #faf6f0; --ring-bg: #e0d8c8;
  --border: #d4c8b0; --font: Georgia, 'Noto Serif SC', serif; --radius: 24px;
}
/* 可爱风格 */
body.theme-cute {
  --bg: #fff0f5; --bg2: #ffe4ec; --text: #5a3040; --text2: #b08090;
  --accent: #ff6b8a; --accent2: #ffb6c1; --card-bg: #fff; --ring-bg: #ffe4ec;
  --border: #ffd0dc; --font: 'ZCOOL KuaiLe', system-ui, sans-serif; --radius: 20px;
  --shadow: 0 4px 20px rgba(255,107,138,0.12);
}
/* 明星风格 */
body.theme-celebrity {
  --bg: #0d0d1a; --bg2: #151530; --text: #fff; --text2: #a0a0c0;
  --accent: #ffd700; --accent2: #c0c0c0; --card-bg: #151530; --ring-bg: #202040;
  --border: #303050; --font: Georgia, serif; --radius: 12px;
  --glow: 0 0 30px rgba(255,215,0,0.25); --shadow: 0 4px 30px rgba(0,0,0,0.4);
}
/* 异地情侣 */
body.theme-couple {
  --bg: #fff5f5; --bg2: #ffe8e8; --text: #4a2020; --text2: #8a6060;
  --accent: #ff6b6b; --accent2: #ffb3b3; --card-bg: #fff; --ring-bg: #ffe0e0;
  --border: #ffcccc; --font: system-ui, sans-serif; --radius: 16px;
  --shadow: 0 4px 20px rgba(255,107,107,0.1);
}

/* ========== 基础样式 ========== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.app { max-width:600px; margin:0 auto; padding:16px 20px 40px; position:relative; z-index:2; }

/* ========== 全屏壁纸 ========== */
.bg-wallpaper {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-size:cover; background-position:center; background-repeat:no-repeat;
  opacity:0; transition:opacity 0.6s ease;
}
.bg-wallpaper.active { opacity:1; }
.bg-tint {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:rgba(0,0,0,0.35); opacity:0; transition:opacity 0.6s ease;
}
/* 可爱风格用浅色遮罩 */
body.theme-cute .bg-tint { background:rgba(255,255,255,0.55); }
.bg-tint.active { opacity:1; }

/* ========== 风格选择器（下拉面板） ========== */
.theme-picker { position:relative; display:flex; justify-content:center; padding:4px 0 12px; }
.theme-toggle {
  display:inline-flex; align-items:center; gap:6px; padding:8px 20px;
  border-radius:22px; border:1.5px solid var(--border); background:var(--card-bg);
  color:var(--text); font-size:14px; cursor:pointer; font-family:var(--font);
  transition:all var(--transition);
}
.theme-toggle:hover { border-color:var(--accent); }
.theme-toggle .arrow { font-size:10px; transition:transform 0.25s ease; }
.theme-toggle.open .arrow { transform:rotate(180deg); }
.theme-overlay { position:fixed; inset:0; z-index:99; display:none; }
.theme-overlay.show { display:block; }
.theme-dropdown {
  position:absolute; top:100%; left:50%; transform:translateX(-50%);
  background:var(--card-bg); border:1.5px solid var(--border); border-radius:14px;
  padding:10px; display:grid; grid-template-columns:repeat(2,1fr); gap:6px;
  z-index:100; box-shadow:0 8px 30px rgba(0,0,0,0.12); min-width:260px;
  opacity:0; visibility:hidden; transition:opacity 0.2s ease, visibility 0.2s ease;
}
.theme-dropdown.show { opacity:1; visibility:visible; }
.theme-option {
  padding:10px 12px; border-radius:10px; border:1.5px solid transparent;
  background:var(--bg); color:var(--text2); font-size:13px; cursor:pointer;
  font-family:var(--font); text-align:center; transition:all var(--transition);
  white-space:nowrap;
}
.theme-option:hover { border-color:var(--accent); color:var(--accent); }
.theme-option.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ========== 计时器区域 ========== */
.timer-section {
  display:flex; flex-direction:column; align-items:center; padding:20px 0 10px;
}
.timer-ring-wrap { position:relative; width:var(--timer-size); height:var(--timer-size); }
.timer-ring-wrap svg { width:100%; height:100%; transform:rotate(-90deg); }
.ring-bg {
  fill:none; stroke:var(--ring-bg); stroke-width:var(--ring-width);
}
.ring-fg {
  fill:none; stroke:var(--accent); stroke-width:var(--ring-width);
  stroke-linecap:round; transition:stroke-dashoffset 0.4s linear, stroke var(--transition);
  filter:var(--glow);
}
.timer-display {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:52px; font-weight:700; letter-spacing:2px; font-variant-numeric:tabular-nums;
  font-family:var(--font); color:var(--text); transition:color var(--transition);
}
.timer-display.paused { opacity:0.5; }
.mode-indicator {
  font-size:13px; color:var(--text2); margin-top:6px; letter-spacing:1px;
  text-transform:uppercase; font-family:var(--font);
}
.round-dots { display:flex; gap:6px; margin-top:8px; }
.round-dot {
  width:10px; height:10px; border-radius:50%; background:var(--ring-bg);
  transition:all var(--transition);
}
.round-dot.done { background:var(--accent2); }
.round-dot.current { background:var(--accent); transform:scale(1.3); }

/* ========== 激励语 ========== */
.quote {
  text-align:center; padding:12px 20px; font-size:15px; color:var(--text2);
  font-family:var(--font); line-height:1.6; min-height:48px;
  transition:all var(--transition);
}

/* ========== 控制按钮 ========== */
.controls { display:flex; justify-content:center; gap:12px; margin:8px 0 16px; flex-wrap:wrap; }
.ctrl-btn {
  padding:12px 28px; border-radius:28px; border:none; font-size:15px; cursor:pointer;
  font-family:var(--font); font-weight:600; transition:all var(--transition);
  letter-spacing:0.5px;
}
.btn-start {
  background:var(--accent); color:#fff; min-width:120px; box-shadow:var(--glow);
}
.btn-start:hover { opacity:0.85; transform:translateY(-1px); }
.btn-reset {
  background:var(--card-bg); color:var(--text2); border:1.5px solid var(--border);
}
.btn-reset:hover { border-color:var(--accent); color:var(--accent); }
.btn-skip {
  background:transparent; color:var(--text2); border:1.5px solid var(--border);
  font-size:13px; padding:10px 18px;
}
.btn-skip:hover { border-color:var(--accent2); color:var(--accent2); }

/* ========== 风格专属面板 ========== */
.theme-panel { margin-top:8px; }
.theme-panel:empty { display:none; }

/* 可爱角色选择 */
.char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; padding:8px 0; }
.char-card {
  aspect-ratio:1; border-radius:var(--radius); border:2px solid var(--border);
  background:var(--card-bg); display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:pointer; transition:all var(--transition);
  overflow:hidden; gap:4px;
}
.char-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.char-card.selected { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%, transparent); }
.char-card .char-img {
  width:52px; height:52px; border-radius:50%; object-fit:cover;
  background:var(--ring-bg); font-size:36px; display:flex; align-items:center; justify-content:center;
}
.char-card .char-name { font-size:11px; color:var(--text2); font-family:var(--font); }

/* 明星选择 */
.star-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; padding:8px 0; }
.star-card {
  aspect-ratio:1; border-radius:var(--radius); border:2px solid var(--border);
  background:var(--card-bg); display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:pointer; transition:all var(--transition);
  overflow:hidden; gap:4px;
}
.star-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.star-card.selected { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%, transparent); }
.star-card .star-img {
  width:52px; height:52px; border-radius:50%; object-fit:cover;
  background:var(--ring-bg); font-size:36px; display:flex; align-items:center; justify-content:center;
}
.star-card .star-name { font-size:11px; color:var(--text2); font-family:var(--font); }

/* 壁纸位置滑块 */
.wallpaper-slider {
  display:flex; align-items:center; gap:10px; padding:8px 4px;
  font-size:12px; color:var(--text2); font-family:var(--font);
}
.wallpaper-slider input[type=range] {
  flex:1; -webkit-appearance:none; appearance:none; height:28px;
  border-radius:2px; background:transparent; outline:none; cursor:pointer;
  touch-action:pan-x;
}
.wallpaper-slider input[type=range]::-webkit-slider-runnable-track {
  height:4px; border-radius:2px; background:var(--ring-bg);
}
.wallpaper-slider input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:28px; height:28px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:none;
  margin-top:-12px;
}
.wallpaper-slider input[type=range]::-moz-range-track {
  height:4px; border-radius:2px; background:var(--ring-bg);
}
.wallpaper-slider input[type=range]::-moz-range-thumb {
  width:28px; height:28px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:none;
}
.wallpaper-slider .ws-val { min-width:32px; text-align:center; }

/* 情侣视频面板 */
.couple-panel { padding:8px 0; }
.video-container { position:relative; width:100%; border-radius:var(--radius); overflow:hidden; background:var(--bg2); }
.video-main { width:100%; aspect-ratio:16/10; object-fit:cover; background:#1a1a1a; display:block; }
.video-pip {
  position:absolute; bottom:12px; right:12px; width:120px; aspect-ratio:16/10;
  object-fit:cover; border-radius:8px; border:2px solid rgba(255,255,255,0.6);
  cursor:pointer; background:#2a2a2a; z-index:2;
}
.video-placeholder {
  width:100%; aspect-ratio:16/10; display:flex; align-items:center; justify-content:center;
  color:var(--text2); font-size:48px; font-family:var(--font); flex-direction:column; gap:12px;
}
.video-placeholder span { font-size:14px; }
.couple-controls { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
.couple-btn {
  padding:10px 20px; border-radius:20px; border:1.5px solid var(--border);
  background:var(--card-bg); color:var(--text); cursor:pointer;
  font-family:var(--font); font-size:13px; transition:all var(--transition);
}
.couple-btn:hover { border-color:var(--accent); }
.couple-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.couple-signal-box {
  width:100%; margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;
}
.couple-signal-box input {
  flex:1; min-width:160px; padding:10px; border-radius:8px;
  border:1.5px solid var(--border); background:var(--card-bg); color:var(--text);
  font-family:var(--font); font-size:12px;
}
.couple-status { font-size:12px; color:var(--text2); text-align:center; margin-top:6px; }

/* ========== 历史记录 ========== */
.history-section { margin-top:24px; }
.history-title {
  font-size:14px; font-weight:600; color:var(--text2); margin-bottom:8px;
  font-family:var(--font); display:flex; align-items:center; gap:8px;
}
.history-clear { font-size:11px; color:var(--accent); cursor:pointer; border:none; background:none; }
.history-list { display:flex; flex-direction:column; gap:6px; }
.history-item {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 14px; border-radius:10px; background:var(--card-bg);
  border:1px solid var(--border); font-size:13px; transition:all var(--transition);
}
.history-item .hi-date { color:var(--text2); font-size:11px; }
.history-item .hi-type { font-weight:600; }
.history-item .hi-type.focus { color:var(--accent); }
.history-item .hi-duration { color:var(--text2); font-variant-numeric:tabular-nums; }
.empty-history { text-align:center; color:var(--text2); font-size:13px; padding:20px; }

/* ========== 响应式 ========== */
@media (max-width:768px) {
  .app { padding:12px 14px 32px; }
  :root { --timer-size:220px; --ring-width:8; }
  .theme-dropdown { min-width:240px; max-width:calc(100vw - 40px); }
  .timer-display { font-size:42px; }
  .ctrl-btn { padding:10px 22px; font-size:14px; }
  .char-grid, .star-grid { grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:8px; }
  .char-card .char-img, .star-card .star-img { width:42px; height:42px; font-size:28px; }
}
@media (max-width:400px) {
  .app { padding:8px 10px 24px; }
  :root { --timer-size:180px; --ring-width:7; }
  .theme-dropdown { min-width:220px; padding:8px; gap:4px; }
  .theme-option { padding:8px 6px; font-size:12px; }
  .theme-toggle { font-size:13px; padding:7px 16px; }
  .timer-display { font-size:36px; }
  .ctrl-btn { padding:8px 16px; font-size:13px; border-radius:22px; }
  .controls { gap:8px; }
  .char-grid, .star-grid { grid-template-columns:repeat(auto-fill,minmax(62px,1fr)); gap:6px; }
  .char-card .char-img, .star-card .star-img { width:36px; height:36px; font-size:24px; }
}

/* ========== 动画 ========== */
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
.timer-display.running { animation:pulse 2s ease-in-out infinite; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.quote { animation:fadeIn 0.5s ease; }
.theme-panel { animation:fadeIn 0.3s ease; }

/* 赛博朋克特殊效果 */
body.theme-cyberpunk .ring-fg { animation:glitch 3s infinite; }
@keyframes glitch {
  0%,94%,96%,98%,100% { opacity:1; }
  95%,97% { opacity:0.6; }
}
body.theme-electronic .timer-ring-wrap svg { animation:scan 4s linear infinite; }
@keyframes scan { 0% { filter:brightness(1); } 50% { filter:brightness(1.2); } 100% { filter:brightness(1); } }

/* 液晶屏闪烁 */
body.theme-lcd .timer-display { text-shadow:0 0 2px rgba(0,0,0,0.3); }
body.theme-lcd .app { background:linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%); }

/* 自然有机 - 柔和呼吸 */
body.theme-natural .timer-ring-wrap { filter:drop-shadow(0 4px 12px rgba(91,140,90,0.15)); }

/* 明星 - 闪烁星光 */
body.theme-celebrity .ring-fg { filter:drop-shadow(0 0 8px rgba(255,215,0,0.5)); }

/* 情侣 - 心跳 */
body.theme-couple .timer-display.running { animation:none; }
@keyframes heartbeat { 0%,100% { transform:translate(-50%,-50%) scale(1); } 15% { transform:translate(-50%,-50%) scale(1.05); } 30% { transform:translate(-50%,-50%) scale(1); } }
body.theme-couple .timer-display.running { animation:heartbeat 1.5s ease-in-out infinite; }
</style>
</head>
<body class="theme-minimalist">

<!-- 全屏壁纸背景（可爱/明星风格选中后显示） -->
<div class="bg-wallpaper" id="bgWallpaper"></div>
<div class="bg-tint" id="bgTint"></div>

<div class="app">
  <!-- 风格选择器 -->
  <div class="theme-picker" id="themePicker">
    <button class="theme-toggle" id="themeToggle">
      <span id="themeLabel">极简主义</span>
      <span class="arrow">▼</span>
    </button>
    <div class="theme-overlay" id="themeOverlay"></div>
    <div class="theme-dropdown" id="themeDropdown">
      <button class="theme-option active" data-theme="minimalist">极简主义</button>
      <button class="theme-option" data-theme="cyberpunk">赛博朋克</button>
      <button class="theme-option" data-theme="electronic">电子风格</button>
      <button class="theme-option" data-theme="lcd">液晶风格</button>
      <button class="theme-option" data-theme="natural">自然有机</button>
      <button class="theme-option" data-theme="cute">可爱风格</button>
      <button class="theme-option" data-theme="celebrity">明星风格</button>
      <button class="theme-option" data-theme="couple">异地情侣</button>
    </div>
  </div>

  <!-- 计时器 -->
  <div class="timer-section">
    <div class="timer-ring-wrap" id="timerRing">
      <svg viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="100"/>
        <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100"
          stroke-dasharray="628.32" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display" id="timerDisplay">25:00</div>
    </div>
    <div class="mode-indicator" id="modeIndicator">专注 - 第 1 轮</div>
    <div class="round-dots" id="roundDots">
      <span class="round-dot current"></span>
      <span class="round-dot"></span>
      <span class="round-dot"></span>
      <span class="round-dot"></span>
    </div>
  </div>

  <!-- 激励语 -->
  <div class="quote" id="quote">少即是多，专注当下。</div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="ctrl-btn btn-start" id="btnStart">开始专注</button>
    <button class="ctrl-btn btn-reset" id="btnReset">重置</button>
    <button class="ctrl-btn btn-skip" id="btnSkip">跳过</button>
  </div>

  <!-- 风格专属面板 -->
  <div class="theme-panel" id="themePanel"></div>

  <!-- 历史记录 -->
  <div class="history-section">
    <div class="history-title">
      历史记录
      <button class="history-clear" id="btnClearHistory">清空</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history">暂无记录，开始你的第一个番茄钟吧~</div>
    </div>
  </div>
</div>

<!-- 隐藏的本地视频元素（用于 WebRTC） -->
<video id="localVideo" autoplay muted playsinline style="display:none"></video>

<script>
/* ================================================================
   番茄钟 - Pomodoro Timer
   单文件 HTML，无需后端，数据存储在 localStorage
   ================================================================ */

// ─── 音频管理器 ────────────────────────────────────────
const Audio = {
  ctx: null,
  getCtx() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this.ctx;
  },
  play(type) {
    try {
      const ctx = this.getCtx();
      const now = ctx.currentTime;
      // 不同风格不同音效
      if (type === 'focus_end') {
        // 三连上升音
        [0, 0.15, 0.3].forEach((t, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = 520 + i * 130;
          gain.gain.setValueAtTime(0.3, now + t);
          gain.gain.exponentialRampToValueAtTime(0.01, now + t + 0.3);
          osc.start(now + t); osc.stop(now + t + 0.35);
        });
      } else if (type === 'break_end') {
        // 柔和两音
        [0, 0.2].forEach((t, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = 440 - i * 60;
          gain.gain.setValueAtTime(0.25, now + t);
          gain.gain.exponentialRampToValueAtTime(0.01, now + t + 0.4);
          osc.start(now + t); osc.stop(now + t + 0.45);
        });
      }
    } catch(e) { /* 音频不可用时静默忽略 */ }
  }
};

// ─── 存储管理器 ─────────────────────────────────────────
const Storage = {
  key: 'pomodoro_data',
  get() {
    try {
      const raw = localStorage.getItem(this.key);
      return raw ? JSON.parse(raw) : { theme:'minimalist', history:[], cute:null, star:null };
    } catch { return { theme:'minimalist', history:[], cute:null, star:null }; }
  },
  save(data) {
    try { localStorage.setItem(this.key, JSON.stringify(data)); } catch {}
  },
  loadState() {
    const data = this.get();
    if (data.theme) setTheme(data.theme);
    if (data.cute) state.selectedCute = data.cute;
    if (data.star) state.selectedStar = data.star;
    renderHistory(data.history || []);
    renderThemePanel();
  },
  addHistory(entry) {
    const data = this.get();
    data.history.unshift(entry);
    if (data.history.length > 100) data.history = data.history.slice(0, 100); // 最多100条
    this.save(data);
    renderHistory(data.history);
  },
  clearHistory() {
    const data = this.get();
    data.history = [];
    this.save(data);
    renderHistory([]);
  },
  persistSettings() {
    const data = this.get();
    data.theme = state.theme;
    data.cute = state.selectedCute;
    data.star = state.selectedStar;
    this.save(data);
  },
};

// ─── 渲染函数 ──────────────────────────────────────────

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent = formatTime(state.timeLeft);
  // 更新圆环
  const progress = 1 - (state.timeLeft / state.totalTime);
  const offset = CIRCUMFERENCE * progress;
  document.getElementById('ringFg').setAttribute('stroke-dashoffset', offset);

  // 运行/暂停状态样式
  const display = document.getElementById('timerDisplay');
  display.classList.remove('running','paused');
  if (state.timerStatus === 'running') display.classList.add('running');
  if (state.timerStatus === 'paused') display.classList.add('paused');
}

function updateModeIndicator() {
  const el = document.getElementById('modeIndicator');
  const modeNames = { focus:'专注', short_break:'短休息', long_break:'长休息' };
  el.textContent = modeNames[state.mode] + ' - 第 ' + state.round + ' 轮';
}

function updateRoundDots() {
  const dots = document.querySelectorAll('#roundDots .round-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('done','current');
    if (i + 1 < state.round || (i + 1 === state.round && state.mode !== 'focus')) {
      dot.classList.add('done');
    } else if (i + 1 === state.round && state.mode === 'focus') {
      dot.classList.add('current');
    }
  });
}

function randomQuote() {
  const list = quotes[state.theme] || quotes.minimalist;
  return list[Math.floor(Math.random() * list.length)];
}

function updateQuote() {
  document.getElementById('quote').textContent = randomQuote();
}

function updateStartButton() {
  const btn = document.getElementById('btnStart');
  if (state.timerStatus === 'running') {
    btn.textContent = '暂停';
  } else if (state.timerStatus === 'paused') {
    btn.textContent = '继续';
  } else {
    btn.textContent = state.mode === 'focus' ? '开始专注' : '开始休息';
  }
}

function renderHistory(history) {
  const list = document.getElementById('historyList');
  if (!history || history.length === 0) {
    list.innerHTML = '<div class="empty-history">暂无记录，开始你的第一个番茄钟吧~</div>';
    return;
  }
  list.innerHTML = history.slice(0, 20).map(h => {
    const typeName = { focus:'🍅 专注', short_break:'☕ 短休息', long_break:'🛌 长休息' };
    const date = new Date(h.time);
    const dateStr = date.toLocaleDateString('zh-CN') + ' ' +
      date.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    return `<div class="history-item">
      <span class="hi-type ${h.mode}">${typeName[h.mode] || h.mode}</span>
      <span class="hi-duration">${formatTime(h.duration)}</span>
      <span class="hi-date">${dateStr}</span>
    </div>`;
  }).join('');
}

function updateWallpaper() {
  const wallpaper = document.getElementById('bgWallpaper');
  const tint = document.getElementById('bgTint');
  let imgUrl = '';

  if (state.theme === 'cute' && state.selectedCute) {
    const c = cuteCharacters.find(ch => ch.id === state.selectedCute);
    imgUrl = c ? c.imgUrl : '';
  } else if (state.theme === 'celebrity' && state.selectedStar) {
    const s = celebrities.find(st => st.id === state.selectedStar);
    imgUrl = s ? s.imgUrl : '';
  }

  if (imgUrl) {
    wallpaper.style.backgroundImage = `url(${imgUrl})`;
    wallpaper.style.backgroundPosition = `center ${getWallpaperY(imgUrl)}%`;
    wallpaper.classList.add('active');
    tint.classList.add('active');
  } else {
    wallpaper.classList.remove('active');
    tint.classList.remove('active');
  }
}

function getActiveWallpaperUrl() {
  if (state.theme === 'cute' && state.selectedCute) {
    const c = cuteCharacters.find(ch => ch.id === state.selectedCute);
    return c ? c.imgUrl : '';
  }
  if (state.theme === 'celebrity' && state.selectedStar) {
    const s = celebrities.find(st => st.id === state.selectedStar);
    return s ? s.imgUrl : '';
  }
  return '';
}

function renderWallpaperSlider(panel) {
  const imgUrl = getActiveWallpaperUrl();
  if (!imgUrl) return;
  const y = getWallpaperY(imgUrl);
  const div = document.createElement('div');
  div.className = 'wallpaper-slider';
  div.innerHTML = `
    <span>壁纸</span>
    <input type="range" min="0" max="100" value="${y}" id="wallpaperSlider">
    <span class="ws-val" id="wsVal">${y}%</span>
  `;
  panel.appendChild(div);
  // 绑定滑块事件
  const slider = div.querySelector('#wallpaperSlider');
  const valEl = div.querySelector('#wsVal');
  const bgEl = document.getElementById('bgWallpaper');
  const onSlide = () => {
    const v = parseInt(slider.value);
    wallpaperPos[imgUrl] = v;
    valEl.textContent = v + '%';
    if (bgEl) bgEl.style.backgroundPosition = `center ${v}%`;
  };
  slider.addEventListener('input', onSlide);
  slider.addEventListener('change', onSlide);
  // 阻止移动端触摸时页面滚动
  slider.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive:true });
  slider.addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive:true });
}

  else if (state.theme === 'celebrity') renderStarPanel(panel);
  else if (state.theme === 'couple') renderCouplePanel(panel);
  else panel.innerHTML = '';
  updateWallpaper();
}

          <button class="couple-btn primary" id="btnCreateRoom">创建房间</button>

      if (mainVid) {

        mainVid.play().catch(() => {});
      }
    });

  setTimeout(() => bindCoupleEvents(), 50);
}

function bindCoupleEvents() {
  const btnCam = document.getElementById('btnStartCam');
  const btnStopCam = document.getElementById('btnStopCam');
  const btnCreate = document.getElementById('btnCreateRoom');
  const btnJoin = document.getElementById('btnJoinRoom');
  const btnHangUp = document.getElementById('btnHangUp');

  if (btnCam) btnCam.addEventListener('click', startCamera);
  if (btnStopCam) btnStopCam.addEventListener('click', stopCamera);
  if (btnHangUp) btnHangUp.addEventListener('click', hangUp);
  if (btnCreate) btnCreate.addEventListener('click', createRoom);
  if (btnJoin) btnJoin.addEventListener('click', joinRoom);
}

// ─── 视频连接（Canvas 帧中继 + WebSocket） ──────────

let signaling = null;     // WebSocket 连接
let relayTimer = null;    // 帧发送定时器
let relayCanvas = null;   // 帧捕获 canvas
let relayRunning = false; // 是否正在发送帧

function generateRoomCode() {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let code = '';
  for (let i = 0; i < 8; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    state.webrtc.localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    renderThemePanel();
  } catch(e) {
    alert('无法访问摄像头，请检查浏览器权限设置。\n\n错误：' + e.message);
  }
}

function stopCamera() {
  stopRelay();
  const container = document.getElementById('videoContainer');
  if (container) container.innerHTML = '';
  const hiddenVid = document.getElementById('localVideo');
  if (hiddenVid) hiddenVid.srcObject = null;

  if (state.webrtc.localStream) {
    state.webrtc.localStream.getTracks().forEach(t => t.stop());
    state.webrtc.localStream = null;
  }
  hangUp();
}

// ─── Canvas 帧中继 ─────────────────────────────────

function startRelay() {
  if (relayRunning) return;
  if (!state.webrtc.localStream) return;

  // 使用独立 video 元素捕获帧，不依赖 DOM 中可能隐藏的元素
  const captureVideo = document.createElement('video');
  captureVideo.srcObject = state.webrtc.localStream;
  captureVideo.muted = true;
  captureVideo.playsInline = true;
  captureVideo.setAttribute('playsinline', '');
  captureVideo.play().catch(() => {});
  // 必须添加到 DOM 且不能 display:none（否则部分浏览器不渲染帧）
  captureVideo.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1';
  document.body.appendChild(captureVideo);

  relayCanvas = document.createElement('canvas');
  relayCanvas.width = 240;
  relayCanvas.height = 180;
  const ctx = relayCanvas.getContext('2d');
  relayRunning = true;

  function capture() {
    if (!relayRunning) {
      // 清理
      captureVideo.pause();
      captureVideo.srcObject = null;
      captureVideo.remove();
      return;
    }
    try { ctx.drawImage(captureVideo, 0, 0, 240, 180); } catch(e) {}
    relayCanvas.toBlob((blob) => {
      if (blob && signaling && signaling.readyState === WebSocket.OPEN) {
        signaling.send(blob);
      }
    }, 'image/jpeg', 0.4);
    relayTimer = setTimeout(capture, 150); // ~6 FPS
  }
  capture();
}

function stopRelay() {
  relayRunning = false;
  if (relayTimer) { clearTimeout(relayTimer); relayTimer = null; }
  relayCanvas = null;
  // 清理远程画面
  const img = document.getElementById('remoteImg');
  if (img) { if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src); img.src = ''; }
}

// ─── WebSocket 信令 ─────────────────────────────────

function connectSignaling(onOpen) {
  if (signaling) {
    signaling.onclose = null; signaling.onerror = null; signaling.onmessage = null;
    signaling.close();
    signaling = null;
  }

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  signaling = new WebSocket(protocol + '//' + location.host);
  signaling.binaryType = 'blob';

  signaling.onopen = () => { if (onOpen) onOpen(); };

  signaling.onmessage = (e) => {
    // 二进制帧（类型判断兼容所有浏览器）
    if (typeof e.data !== 'string') {
      state.webrtc._frameCount = (state.webrtc._frameCount || 0) + 1;
      let blob = e.data;
      // 某些浏览器可能给 ArrayBuffer，自己转一下
      if (blob instanceof ArrayBuffer || blob.constructor?.name === 'ArrayBuffer') {
        blob = new Blob([blob], { type: 'image/jpeg' });
      }
      const img = document.getElementById('remoteImg');
      if (img) {
        const old = img.src;
        img.src = URL.createObjectURL(blob);
        if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
        // 每 10 帧更新一次状态
        if (state.webrtc._frameCount % 10 === 0) {
          setStatus('已连接 · 收到 ' + state.webrtc._frameCount + ' 帧');
        }
      }
      return;
    }

    // JSON 信令
    const msg = JSON.parse(e.data);
    console.log('[信令] 收到:', msg.type);
    switch (msg.type) {
      case 'created':
        renderThemePanel();
        break;
      case 'peer-joined':
        state.webrtc.connected = true;
        setStatus('已连接');
        startRelay();
        renderThemePanel();
        break;
      case 'joined':
        state.webrtc.connected = true;
        setStatus('已连接');
        startRelay();
        renderThemePanel();
        break;
      case 'hangup':
        handleRemoteHangup();
        break;
      case 'error':
        alert(msg.message);
        break;
    }
  };

  signaling.onclose = () => {
    signaling = null;
    if (state.webrtc.connected) {
      state.webrtc.connected = false;
      stopRelay();
      renderThemePanel();
    }
  };

  signaling.onerror = () => {
    setStatus('信令服务器连接失败');
  };
}

function setStatus(text) {
  state.webrtc._status = text;
  const el = document.getElementById('coupleStatus');
  if (el) el.textContent = text;
}

function handleRemoteHangup() {
  stopRelay();
  state.webrtc.connected = false;
  renderThemePanel();
}

// ─── 房间操作 ───────────────────────────────────────

function createRoom() {
  if (!state.webrtc.localStream) { alert('请先打开摄像头'); return; }
  const input = document.getElementById('roomCodeInput');
  let roomCode = (input.value || '').trim();
  if (!roomCode) { roomCode = generateRoomCode(); input.value = roomCode; }
  state.webrtc.roomCode = roomCode;

  connectSignaling(() => {
    signaling.send(JSON.stringify({ type: 'create', room: roomCode }));
    setStatus('等待对方加入... 房间号：' + roomCode);
  });
}

function joinRoom() {
  if (!state.webrtc.localStream) { alert('请先打开摄像头'); return; }
  const input = document.getElementById('roomCodeInput');
  const roomCode = (input.value || '').trim();
  if (!roomCode) { alert('请输入对方分享的房间号'); return; }
  state.webrtc.roomCode = roomCode;

  connectSignaling(() => {
    signaling.send(JSON.stringify({ type: 'join', room: roomCode }));
    setStatus('正在连接 ' + roomCode + '...');
  });
}

function hangUp() {
  stopRelay();
  if (signaling && signaling.readyState === WebSocket.OPEN) {
    signaling.send(JSON.stringify({ type: 'hangup' }));
  }
  if (signaling) { signaling.close(); signaling = null; }
  state.webrtc.connected = false;
  state.webrtc.isMainVideoRemote = true;
  state.webrtc.roomCode = null;
  renderThemePanel();
}

// ─── 计时器引擎 ────────────────────────────────────────

function startTimer() {
  if (state.timerStatus === 'idle') {
    // 新开始
    if (state.mode === 'focus') {
      state.totalTime = FOCUS_TIME;
      state.timeLeft = FOCUS_TIME;
    }
  }
  state.timerStatus = 'running';
  updateStartButton();
  updateTimerDisplay();
  updateQuote();

  clearInterval(state.timerInterval);
  const startTime = Date.now();
  const startLeft = state.timeLeft;

  state.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    state.timeLeft = Math.max(0, startLeft - elapsed);
    updateTimerDisplay();

    if (state.timeLeft <= 0) {
      timerComplete();
    }
  }, 200);
}

function pauseTimer() {
  state.timerStatus = 'paused';
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  updateStartButton();
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerStatus = 'idle';
  state.timeLeft = state.mode === 'focus' ? FOCUS_TIME : (state.mode === 'long_break' ? LONG_BREAK : SHORT_BREAK);
  state.totalTime = state.timeLeft;
  updateStartButton();
  updateTimerDisplay();
}

function skipTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  timerComplete();
}

function timerComplete() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;

  const doneMode = state.mode;

  // 记录历史
  Storage.addHistory({
    time: Date.now(),
    mode: state.mode,
    duration: state.mode === 'focus' ? FOCUS_TIME : (state.mode === 'long_break' ? LONG_BREAK : SHORT_BREAK),
  });

  // 播放音效
  Audio.play(doneMode === 'focus' ? 'focus_end' : 'break_end');

  // 切换到下一个模式
  if (state.mode === 'focus') {
    state.completedRounds++;
    if (state.completedRounds % ROUNDS_PER_CYCLE === 0) {
      state.mode = 'long_break';
      state.timeLeft = LONG_BREAK;
    } else {
      state.mode = 'short_break';
      state.timeLeft = SHORT_BREAK;
    }
  } else {
    // 休息结束，开始下一轮专注
    state.mode = 'focus';
    state.round = (state.round % ROUNDS_PER_CYCLE) + 1;
    state.timeLeft = FOCUS_TIME;
  }

  state.totalTime = state.timeLeft;
  state.timerStatus = 'idle';
  updateTimerDisplay();
  updateModeIndicator();
  updateRoundDots();
  updateStartButton();
  updateQuote();

  // 浏览器通知
  notifyCompletion(doneMode);

  // 更新圆环（重置）
  document.getElementById('ringFg').setAttribute('stroke-dashoffset', '0');
}

function notifyCompletion(mode) {
  const msg = mode === 'focus'
    ? '🎉 专注时间结束！休息一下吧~'
    : '⏰ 休息时间结束！准备开始新的专注吧~';
  // 页面标题闪烁
  const origTitle = document.title;
  document.title = msg;
  setTimeout(() => { document.title = origTitle; }, 3000);
  // Web Notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('番茄钟', { body: msg, icon:'🍅' });
  }
}

// ─── 风格切换 ──────────────────────────────────────────

const themeNames = {
  minimalist:'极简主义', cyberpunk:'赛博朋克', electronic:'电子风格',
  lcd:'液晶风格', natural:'自然有机', cute:'可爱风格',
  celebrity:'明星风格', couple:'异地情侣',
};

function setTheme(name) {
  state.theme = name;
  document.body.className = 'theme-' + name;
  // 更新下拉选项状态
  document.querySelectorAll('.theme-option').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === name);
  });
  // 更新切换按钮文字
  document.getElementById('themeLabel').textContent = themeNames[name] || name;
  updateQuote();
  renderThemePanel();
  Storage.persistSettings();

  if (name !== 'couple' && state.webrtc.localStream) {
    stopCamera();
  }

  updateTimerDisplay();
}

function toggleThemeDropdown() {
  const dropdown = document.getElementById('themeDropdown');
  const overlay = document.getElementById('themeOverlay');
  const toggle = document.getElementById('themeToggle');
  const show = !dropdown.classList.contains('show');
  dropdown.classList.toggle('show', show);
  overlay.classList.toggle('show', show);
  toggle.classList.toggle('open', show);
}

function closeThemeDropdown() {
  document.getElementById('themeDropdown').classList.remove('show');
  document.getElementById('themeOverlay').classList.remove('show');
  document.getElementById('themeToggle').classList.remove('open');
}

// ─── 事件绑定 ──────────────────────────────────────────

document.getElementById('btnStart').addEventListener('click', () => {
  // 首次点击时请求通知权限
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  if (state.timerStatus === 'running') {
    pauseTimer();
  } else {
    startTimer();
  }
});

document.getElementById('btnReset').addEventListener('click', resetTimer);
document.getElementById('btnSkip').addEventListener('click', skipTimer);
document.getElementById('btnClearHistory').addEventListener('click', Storage.clearHistory);

// 风格下拉
document.getElementById('themeToggle').addEventListener('click', toggleThemeDropdown);
document.getElementById('themeOverlay').addEventListener('click', closeThemeDropdown);
document.querySelectorAll('.theme-option').forEach(btn => {
  btn.addEventListener('click', () => {
    setTheme(btn.dataset.theme);
    closeThemeDropdown();
  });
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return; // 输入框中不触发
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.timerStatus === 'running') pauseTimer();
    else startTimer();
  } else if (e.code === 'KeyR') {
    resetTimer();
  } else if (e.code === 'KeyS') {
    skipTimer();
  } else if (e.code === 'Escape') {
    closeThemeDropdown();
  }
});

// ─── 初始化 ────────────────────────────────────────────

function init() {
  const saved = Storage.get();
  if (saved.theme) setTheme(saved.theme);
  if (saved.cute) state.selectedCute = saved.cute;
  if (saved.star) state.selectedStar = saved.star;
  updateTimerDisplay();
  updateModeIndicator();
  updateRoundDots();
  updateStartButton();
  updateQuote();
  renderThemePanel();
  renderHistory(saved.history || []);
}

init();
</script>
